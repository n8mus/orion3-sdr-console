# Build + quick test tier on every push. No SDRplay on CI (proprietary,
# user-installed) — the core app must always build without it. The layout
# step enforces the 1808 px width budget; the reference check enforces the
# repo's no-proprietary-software-references rule.
name: CI
on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake g++ make qt6-base-dev qt6-serialport-dev \
            librnnoise-dev libgl1-mesa-dev

      - name: Reference check
        run: |
          hits=$(grep -ri "n4""py" . --exclude-dir=.git | wc -l)
          echo "hits: $hits"
          test "$hits" = "0"

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build app + quick tests
        run: |
          cmake --build build -j"$(nproc)" --target tentec-console \
            cwtest autogaintest trimtest skimtest watchtest

      - name: Quick test tier
        run: |
          ./build/autogaintest
          ./build/trimtest
          ./build/skimtest
          ./build/watchtest
          TTC_CWLEGACY=1 ./build/cwtest --quick | tee cw.out
          grep -q "TOTAL: 100%" cw.out

      - name: Layout budget (max 1808 px)
        run: |
          out=$(QT_QPA_PLATFORM=offscreen TTC_SELFTEST=3 \
                TTC_RIGCTLD_PORT=14599 TTC_RADIO=orion \
                TTC_RADIO_DEV=/dev/null XDG_CONFIG_HOME=$(mktemp -d) \
                ./build/tentec-console 2>&1 | grep "\[layout\]")
          echo "$out"
          min=$(echo "$out" | sed -n 's/.*layout-min \([0-9]*\)x.*/\1/p')
          test -n "$min" && test "$min" -le 1808
