# Cut an AppImage on every version tag (vX.Y.Z) and publish it as a GitHub
# Release. Built with SDRplay support so the panadapter works, but the
# proprietary libsdrplay_api is EXCLUDED from the bundle (never redistribute
# it) — the user's own SDRplay API install provides it at runtime, which
# install.sh sets up. Built on ubuntu-24.04 (matches CI; Qt6 SerialPort is
# only packaged there) — so the AppImage needs glibc >= 2.39 (Ubuntu 24.04+,
# Fedora 40+, current Arch). Fine for the alpha's current-distro testers.
name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake g++ make qt6-base-dev qt6-serialport-dev \
            libgl1-mesa-dev autoconf automake libtool curl file \
            fuse libfuse2 desktop-file-utils

      - name: Build rnnoise from source
        run: |
          git clone --depth 1 https://gitlab.xiph.org/xiph/rnnoise.git /tmp/rnnoise
          cd /tmp/rnnoise && ./autogen.sh && ./configure --prefix=/usr/local
          make -j"$(nproc)" && sudo make install && sudo ldconfig

      # SDRplay API: extract the makeself installer without running it, then
      # place headers + the .so so cmake can link against it. The .so itself
      # is excluded from the AppImage below.
      - name: Install SDRplay API (build-time only)
        run: |
          VER=3.15.2
          curl -fSL "https://www.sdrplay.com/software/SDRplay_RSP_API-Linux-${VER}.run" -o sdr.run
          sh sdr.run --noexec --target sdr_api || sh sdr.run --tar xf || true
          sudo mkdir -p /usr/local/include /usr/local/lib
          sudo cp $(find sdr_api -name '*.h') /usr/local/include/ 2>/dev/null || true
          # Pick the x86_64 build specifically — the archive also ships armhf,
          # and a bare `find | head` would grab the wrong architecture.
          SO=$(find sdr_api -name 'libsdrplay_api.so*' | grep -i x86_64 | head -1)
          echo "found SDRplay lib: $SO"
          test -n "$SO" || { echo "no x86_64 SDRplay lib found"; exit 1; }
          sudo cp "$SO" /usr/local/lib/
          B=$(basename "$SO")
          sudo ln -sf "/usr/local/lib/$B" /usr/local/lib/libsdrplay_api.so.3
          sudo ln -sf /usr/local/lib/libsdrplay_api.so.3 /usr/local/lib/libsdrplay_api.so
          sudo ldconfig

      - name: Configure + build (with SDRplay)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SDRPLAY=ON \
            -DCMAKE_PREFIX_PATH=/usr/local \
            -DCMAKE_CXX_FLAGS=-I/usr/local/include \
            -DCMAKE_EXE_LINKER_FLAGS=-L/usr/local/lib
          cmake --build build -j"$(nproc)"

      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/tentec-console AppDir/usr/bin/
          cp packaging/tentec-console.desktop AppDir/usr/share/applications/
          cp resources/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/tentec-console.png

      - name: Build AppImage (exclude proprietary SDRplay lib)
        run: |
          curl -fSL -o linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fSL -o linuxdeploy-plugin-qt https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy linuxdeploy-plugin-qt
          export QMAKE="$(command -v qmake6 || echo /usr/lib/qt6/bin/qmake6)"
          export OUTPUT="tentec-console-${GITHUB_REF_NAME}-x86_64.AppImage"
          ./linuxdeploy --appdir AppDir --plugin qt \
            --desktop-file AppDir/usr/share/applications/tentec-console.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/tentec-console.png \
            --exclude-library 'libsdrplay_api*' \
            --output appimage
          ls -lh *.AppImage

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: tentec-console-*-x86_64.AppImage
          body: |
            Alpha AppImage for the Ten-Tec SDR Console (Orion / Omni VII).

            **Install (easiest):** run the one-liner from the README, or:
            `bash <(curl -fsSL https://raw.githubusercontent.com/n8mus/orion3-sdr-console/master/install.sh)`

            The SDRplay API (proprietary, required for the panadapter) is NOT
            bundled — install.sh sets it up, or get it from sdrplay.com/api.
            Radio control needs your user in the dialout/uucp group (install.sh
            does this). First launch opens the Setup screen.
